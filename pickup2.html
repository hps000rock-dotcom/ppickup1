<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上掃碼取號</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen p-4 font-sans">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center border border-slate-100">
        <h1 class="text-3xl font-black text-slate-800 mb-1">文藻外語大學教務處</h1>
        <p class="text-slate-400 text-s mb-8">請點擊下方按鈕領取號碼牌</p>

        <div id="action-area">
            <button id="btn-take" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-6 rounded-2xl text-l shadow-lg transition-all active:scale-95">
                點我取號
            </button>
        </div>

        <div id="ticket-area" class="hidden">
            <p class="text-xl text-blue-500 font-bold uppercase tracking-widest">您的號碼牌</p>
            <div id="my-number" class="text-7xl font-black text-blue-600 my-4 tracking-tighter">--</div>
            <p class="text-slate-400 text-l mt-4">請留意現場看板叫號</p>
        </div>

        <hr class="my-6 border-slate-200">

        <div class="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-2xl text-sm">
            <div class="border-r border-slate-200">
                <p class="text-slate-400 text-s mb-1">目前最新叫號</p>
                <p id="current-call" class="text-xl font-bold text-slate-700">--</p>
            </div>
            <div>
                <p class="text-slate-400 text-s mb-1">現場等待人數</p>
                <p id="waiting-count" class="text-xl font-bold text-slate-700">0 人</p>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwT0X0lv7vo7oVYVw95-3STpegY674RP6FgDUCyJ8Li3TLgiqBY1WzoG6M8ks2Zlu0h/exec"; // 💡 請貼上你的 Google Apps Script 網頁應用程式網址

        const btnTake = document.getElementById('btn-take');
        const actionArea = document.getElementById('action-area');
        const ticketArea = document.getElementById('ticket-area');
        const myNumberEl = document.getElementById('my-number');

        // 1. 頁面載入時：檢查手機是否已經有取過號碼
        const savedNumber = localStorage.getItem('my_ticket');
        if (savedNumber) {
            showTicket(savedNumber);
        }

        // 2. 點擊「點我取號」按鈕
        btnTake.addEventListener('click', () => {
            btnTake.innerText = "取號中...";
            btnTake.disabled = true;

            fetch(`${GAS_URL}?action=take`)
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    // 將號碼轉為字串存入
                    localStorage.setItem('my_ticket', String(data.myNumber));
                    showTicket(data.myNumber);
                    document.getElementById('waiting-count').innerText = `${data.waitingCount} 人`;
                }
            })
            .catch(err => {
                alert("網路連線失敗，請重試！");
                btnTake.innerText = "點我取號";
                btnTake.disabled = false;
            });
        });

        // 3. 定時更新現場進度 (每 4 秒同步一次)
        function syncStatus() {
            fetch(GAS_URL)
            .then(res => res.json())
            .then(data => {
                // 更新等待人數
                document.getElementById('waiting-count').innerText = `${data.waitingCount} 人`;
                
                // 確保 counters 存在且是陣列，更新最新叫號
                if (data.counters && Array.isArray(data.counters)) {
                    const validNumbers = data.counters.map(Number).filter(num => num > 0);
                    const maxCalled = validNumbers.length > 0 ? Math.max(...validNumbers) : 0;
                    document.getElementById('current-call').innerText = maxCalled > 0 ? `${maxCalled} 號` : "尚未叫號";
                }
            })
            .catch(err => console.log("同步等待中..."));
        }

        // 介面切換函式
        function showTicket(num) {
            myNumberEl.innerText = `${num} 號`;
            actionArea.classList.add('hidden');
            ticketArea.classList.remove('hidden');
        }

        // 啟動定時器
        setInterval(syncStatus, 4000);
        syncStatus(); 
    </script>
</body>
</html>
